<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhoElse</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body hx-sse="connect:/events">

    <div class="container">
        <h1>WHOELSE?</h1>
        
        <div class="counter-box">
            <span class="label">RIGHT NOW</span>
            <div class="number" hx-sse="swap:dump_update">0</div>
            <p>others are taking a dump.</p>
        </div>

        <button hx-post="/action/dump" hx-swap="none">
            I'm taking a dump
        </button>
    </div>

    <footer>
    We use one tiny, anonymous cookie just so your refreshes don't break the counter. No tracking, no data selling, no bullshit.
    </footer>

</body>
</html>
